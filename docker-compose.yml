services:
  api:
    build:
      context: .
    image: payment-processing-system:local
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      APP_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PAYMENT_MAX_RETRY_ATTEMPTS: ${PAYMENT_MAX_RETRY_ATTEMPTS:-3}
      PAYMENT_RETRY_BASE_DELAY_MS: ${PAYMENT_RETRY_BASE_DELAY_MS:-1000}
      PAYMENT_RETRY_MAX_DELAY_MS: ${PAYMENT_RETRY_MAX_DELAY_MS:-10000}
      PAYMENT_PROCESSING_TIMEOUT_MS: ${PAYMENT_PROCESSING_TIMEOUT_MS:-30000}
      GATEWAY_MIN_DELAY_MS: ${GATEWAY_MIN_DELAY_MS:-150}
      GATEWAY_MAX_DELAY_MS: ${GATEWAY_MAX_DELAY_MS:-1200}
      GATEWAY_REQUEST_TIMEOUT_MS: ${GATEWAY_REQUEST_TIMEOUT_MS:-900}
      GATEWAY_SUCCESS_RATE: ${GATEWAY_SUCCESS_RATE:-0.65}
      GATEWAY_FAILURE_RATE: ${GATEWAY_FAILURE_RATE:-0.2}
      GATEWAY_TIMEOUT_RATE: ${GATEWAY_TIMEOUT_RATE:-0.15}
